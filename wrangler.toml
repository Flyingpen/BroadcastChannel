# EdgeOne Pages 部署配置（基于 Cloudflare Pages 标准）
name = "broadcast-channel"
compatibility_date = "2024-09-20"

[build]
command = "pnpm run build:edgeone"
cwd = "."
watch_dir = "src"

[[pages_build_output_dir]]
bucket = "./dist"

[vars]
# 可在 EdgeOne Pages 控制台中配置环境变量
CHANNEL = ""
LOCALE = "en"
TIMEZONE = "UTC"

# 兼容性标志
compatibility_flags = [ "nodejs_compat" ]
